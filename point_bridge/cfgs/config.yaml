defaults:
  - _self_
  - local
  - agent: pb
  - suite: mimiclabs
  - dataloader: mimiclabs
  - override hydra/launcher: submitit_local

# Dir
root_dir: ${local.root_dir}
data_dir: ${root_dir}/expert_demos

# misc
seed: 2
device: cuda
save_video: true
use_tb: true
batch_size: 16

# experiment
num_demos_per_task: 10000
policy_head: deterministic
use_proprio: false
use_language: false
eval: false
experiment: train
experiment_label: ${policy_head}

# action chunking
action_chunking: true # aggregate actions over time
num_queries: 40
temporal_agg_strategy: "exponential_average" # null means no temporal aggregation

# expert dataset
expert_dataset: ${dataloader.bc_dataset}

# Load weights
load_bc: false
bc_weight: path/to/weight

hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${experiment}/${experiment_label}/${now:%H%M%S}_hidden_dim_${suite.hidden_dim}
  sweep:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
  launcher:
    tasks_per_node: 1
    nodes: 1
    submitit_folder: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${experiment}/.slurm
