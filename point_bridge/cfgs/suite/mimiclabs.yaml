# @package suite
defaults:
  - _self_

suite: mimiclabs
name: "mimiclabs"

# obs and action settings
obs_type: ["points"] # image, points - can be multiple
action_mode: pose # pose, points

# obs dims
img_size: [128,128] # (width, height)

# point hyperparams
num_robot_points: 8
num_points_per_obj: 128
robot_points_key: robot_tracks
object_points_key: object_tracks
use_vlm_points: false
vlm_mode: "segment_depth" # segment_depth, point_tracking

# full scene pcd
use_full_scene_pcd: False
full_scene_num_points: 512
max_depth_meters: 2.0
min_z_robot_frame: 0.0
full_scene_camera_name: "cam_8_left"

# task settings
action_repeat: 1
hidden_dim: 256

# train settings
num_train_steps: 300100
log_every_steps: 1000
save_every_steps: 50000
history_len: 1
bddl_dir: ${root_dir}/third_party/mimiclabs/mimiclabs/mimiclabs/task_suites/new_task_suite

# eval
eval_every_steps: 200000
num_eval_episodes: 5
eval_history_len: 1

# obs_keys
pixel_keys: ["pixels_left", "pixels_right"]
proprio_key: "proprioceptive"
feature_key: "features"

# snapshot
save_snapshot: true

task_make_fn:
  _target_: suite.mimiclabs.make
  bddl_dir: ${suite.bddl_dir}
  task_names: ??? # to be specified later
  action_repeat: ${suite.action_repeat}
  height: ${suite.img_size[1]}
  width: ${suite.img_size[0]}
  seed: ${seed}
  max_episode_len: ??? # to be specified later
  max_state_dim: ??? # to be specified later
  eval: ${eval} # eval true mean use robot
  pixel_keys: ${suite.pixel_keys}
  num_robot_points: ${suite.num_robot_points}
  num_points_per_obj: ${suite.num_points_per_obj}
  robot_points_key: ${suite.robot_points_key}
  object_points_key: ${suite.object_points_key}
  obs_type: ${suite.obs_type}
  action_mode: ${suite.action_mode}
  use_vlm_points: ${suite.use_vlm_points}
  vlm_mode: ${suite.vlm_mode}
  depth_type: "gt" # gt, foundation_stereo
  add_camera_from_extrinsics: False
  camera_extrinsics_file: ${root_dir}/point_bridge/robot_utils/fr3_nyu/calibration_matrices/camera_extrinsics.json
  temporal_agg_strategy: ${temporal_agg_strategy}
  visualize_3d: false
  # full scene pcd
  use_full_scene_pcd: ${suite.use_full_scene_pcd}
  full_scene_num_points: ${suite.full_scene_num_points}
  max_depth_meters: ${suite.max_depth_meters}
  min_z_robot_frame: ${suite.min_z_robot_frame}
  full_scene_camera_name: ${suite.full_scene_camera_name}
